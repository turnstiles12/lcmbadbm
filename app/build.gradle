 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'java'
}

jar {
    archiveFileName = 'badbm.jar'
    manifest {
        attributes 'Main-Class': 'org.example.edu.touro.mco152.bm.App'  // ← your main class
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
    // Charting api/runtime
    implementation group: 'org.jfree', name: 'jfreechart', version: '1.0.17'
    // persistence API
    implementation group: 'org.eclipse.persistence', name: 'eclipselink', version: '4.0.5'
    // DBMS
    implementation group: 'org.apache.derby', name: 'derby', version: '10.15.2.0'
    implementation group: 'org.apache.derby', name: 'derbyshared', version: '10.15.2.0'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.edu.touro.mco152.bm.App'
}
tasks.named('processResources') {
    doNotTrackState("Workaround for OneDrive file locking")
}
tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

sourceSets {
    sourceSets.main.output.resourcesDir = sourceSets.main.java.classesDirectory
}